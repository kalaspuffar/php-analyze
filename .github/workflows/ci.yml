name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: cargo fmt + clippy + test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4"]

    steps:
      - uses: actions/checkout@v4

      # `rust-toolchain.toml` pins the channel and components, so the
      # default action installs the version we expect.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # `ext-php-rs` shells out to `php-config` at build time, so the
      # matching `php<version>-dev` package must be present. Sury PPA is
      # the canonical source for non-distro PHP minor versions on Ubuntu.
      #
      # `ext-php-rs` also pulls `ext-php-rs-bindgen` → `clang-sys` as a
      # build dependency. `clang-sys` needs a working `libclang` on the
      # host or the build aborts with `Unable to find libclang`, so we
      # install `libclang-dev` (the loadable `libclang.so.*`) and `clang`
      # (which bindgen invokes as the preprocessor).
      - name: Install PHP ${{ matrix.php }} development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ondrej/php
          sudo apt-get update
          sudo apt-get install -y \
            php${{ matrix.php }} \
            php${{ matrix.php }}-cli \
            php${{ matrix.php }}-dev \
            libclang-dev \
            clang
          sudo update-alternatives --set php /usr/bin/php${{ matrix.php }} || true
          sudo update-alternatives --set php-config /usr/bin/php-config${{ matrix.php }} || true
          php --version
          php-config --version

      # Cache cargo registry/git and the workspace `target/` directory.
      # The key includes `Cargo.lock` so cache invalidates whenever the
      # resolved dependency graph changes.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-php${{ matrix.php }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all

      # Enforce the shipped-cdylib size cap. The release profile is
      # configured to strip DWARF and symbol tables; this step builds
      # the actual artefact under `[profile.release]` and asserts its
      # on-disk size stays under the cap. Pins the
      # `project-documentation` requirement added by
      # `release-profile-strip-debuginfo`; see `COMMENTS.md` C-20 for
      # why `panic = "unwind"` must NOT be relaxed for further size
      # wins. The cap is generous (5 MiB) versus the observed ~2.7 MiB
      # so S-3 / S-4 follow-ups don't have to revise it.
      - name: release build size cap (≤ 5 MiB)
        run: |
          cargo build --release -p php-analyze
          OBSERVED=$(stat -c %s target/release/libphp_analyze.so)
          CAP=5242880
          echo "libphp_analyze.so: ${OBSERVED} bytes (cap: ${CAP} bytes / 5 MiB)"
          if [ "${OBSERVED}" -gt "${CAP}" ]; then
            echo "::error::libphp_analyze.so is ${OBSERVED} bytes; cap is ${CAP} bytes (5 MiB)."
            echo "Inspect via: objdump -h target/release/libphp_analyze.so"
            exit 1
          fi

      # Keep the `recorder-dump` Cargo feature compiling. Slice 2's
      # integration tests use it; if no CI matrix entry exercises the
      # feature, slice-3 or later changes can accidentally break it
      # and the breakage stays hidden until the next integration run.
      - name: cargo build --features recorder-dump
        run: cargo build -p php-analyze --no-default-features --features recorder-dump

      # Run the slice-2 PHP integration test against the installed
      # PHP version. The test gates on `PHP_ANALYZE_RUN_RECORDER=1`
      # and discovers `php${{ matrix.php }}` on PATH; without the
      # env var it skips loudly with status 0.
      - name: cargo test --test recorder_observer
        env:
          PHP_ANALYZE_RUN_RECORDER: "1"
        run: cargo test --test recorder_observer --features recorder-dump

      # Run the slice-3 (Phase-4) shipper end-to-end round-trip test.
      # Spawns `crates/stub-ingest` against a port-zero loopback bind,
      # runs `tests/php-shipper/noop.php` with `php_analyze.server_url`
      # pointed at the stub, and asserts the wire `Batch` landed on
      # `/debug/batches` with the expected shape. Gates on
      # `PHP_ANALYZE_RUN_SHIPPER=1` and discovers `php${{ matrix.php }}`
      # on PATH; without the env var it skips loudly with status 0.
      - name: cargo test --test shipper_round_trip
        env:
          PHP_ANALYZE_RUN_SHIPPER: "1"
        run: cargo test --test shipper_round_trip
