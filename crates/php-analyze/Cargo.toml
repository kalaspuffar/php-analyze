[package]
name = "php-analyze"
description = "PHP function-call tracing extension (cdylib loaded into PHP 8.3/8.4)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true
authors.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]
# rlib is kept so `cargo test -p php-analyze` can link the test harness;
# the operator-facing artifact is libphp_analyze.so from the cdylib output.

[dependencies]
# `observer` feature is OFF by default upstream; it activates
# `ModuleBuilder::fcall_observer` plus the `FcallObserver` / `FcallInfo`
# surface in `ext_php_rs::zend`. The Phase-0 spike registers an observer
# through that wrapper; Phase 2's Recorder will likely use the same path.
# No new crate is added here â€” only the feature list of an existing dep.
ext-php-rs = { version = "=0.15.13", features = ["observer"] }
# `secrecy` wraps the bearer token in a `SecretString` with redacted `Debug`
# and no `Display` (Â§6.3 of `SPECIFICATION.md`).
secrecy = "0.10"
# `thiserror` powers the `ConfigError` enum.
thiserror = "2"
# `rustc_hash::FxBuildHasher` is the hash builder for the recorder's
# function dictionary (`recorder::dictionary::Dictionary`). Small
# composite keys, trusted inputs â€” SipHash's DoS resistance is wasted
# and its cost is measurable. We use `rustc-hash` (the rust-lang
# maintained fork of the older `fxhash` crate) because it has zero
# transitive dependencies; the older `fxhash` pulls `byteorder`.
rustc-hash = "2"
# `hashbrown::HashMap` is the underlying hashmap for the recorder's
# function dictionary. The default `std::collections::HashMap` does
# not expose `raw_entry_mut` on stable; we need it for the
# `recorder-hot-path-tuning` borrow-keyed probe (a probe by
# `FunctionKeyRef<'a>` that does not allocate the owning
# `FunctionKey`'s `Arc<str>` fields). `hashbrown` is already a
# transitive dep in the workspace; promoting it to a direct dep adds
# no new crate to the lockfile.
hashbrown = "0.15"
# `libc` exposes `clock_gettime`, `getrusage`, `CLOCK_MONOTONIC`,
# `CLOCK_REALTIME`, `RUSAGE_SELF`, and `timeval` â€” everything the
# recorder's clock primitives need. `libc` is already a transitive dep
# (build-dep of `ext-php-rs-bindgen`), so listing it directly costs zero
# new crates in the lockfile. `ext-php-rs::ffi` only re-exports Zend
# types, not POSIX clock symbols.
libc = "0.2"
# `serde` + `rmp-serde` are Phase 3 additions: the `wire` module derives
# `Serialize`/`Deserialize` on the Â§4.2 MessagePack schema types, and
# `rmp_serde::to_vec_named` / `from_slice` are the encoder/decoder pair
# the Phase-4 shipper and the `stub-ingest` crate share. `serde` was
# already a transitive dep via `ext-php-rs`; we promote it to a direct
# dep so the wire derive isn't relying on a transitive supply chain.
serde = { version = "1", features = ["derive"] }
rmp-serde = "1"
# Phase 4 shipper channel; named in `SPECIFICATION.md` Â§1.4 OQ-5.
# `crossbeam_channel::bounded` is the bounded MPSC used between the
# recorder (producer, request thread) and the shipper (consumer, one
# background thread per process). `recv_deadline` is the API the
# MSHUTDOWN drain hinges on; `std::sync::mpsc` does not offer it
# ergonomically.
crossbeam-channel = "0.5"
# Phase 4 slice 3 (`shipper-encoder-and-http`): the HTTP client the
# shipper uses to POST encoded MessagePack batches to the configured
# `server_url`. `ureq` is blocking, single-thread-safe, and uses
# `rustls` natively â€” exactly the shape our dedicated shipper thread
# needs. `platform-verifier` uses the OS trust store (Linux: system CA
# bundle via `rustls-native-certs`-equivalent paths; cross-platform
# wrapper); it is the modern ureq-3.x replacement for wiring
# `rustls-native-certs` directly per `SPECIFICATION.md` Â§7.4. The
# slice's design.md D-6 and `COMMENTS.md` C-16 record the substitution.
ureq = { version = "=3.3.0", default-features = false, features = [
    "rustls",
    "platform-verifier",
] }
# `uuid` v7 timestamps the trace at flush time. The recorder side
# stores `[u8; 16]` (allocation-free); the shipper renders it to the
# 36-char hyphenated wire form via `Uuid::from_bytes(...).to_string()`
# inside `shipper::encode::encode_batch` exactly once per batch.
uuid = { version = "=1.18.1", features = ["v7"] }

[dev-dependencies]
# Used by the `auth_token_file` precedence tests in Â§4.6/Â§4.7/Â§4.8.
tempfile = "3"
# `rmpv` lets a handful of `wire::tests` hand-construct MessagePack maps
# (e.g. the forward-compat "extra unknown field" test) without writing a
# raw-bytes encoder by hand. It is *not* part of the production crate's
# closure â€” the Phase-4 shipper uses `rmp-serde` directly.
rmpv = "1"
# `serde_json` decodes the `/debug/batches` JSON response from
# `stub-ingest` in the Phase-4 slice-3 integration test
# (`tests/shipper_round_trip.rs`). The stub itself depends on
# `serde_json` to produce that JSON; we depend on it here to consume
# it. Not in the production closure â€” production uses MessagePack.
serde_json = "1"
# `criterion` is the bench harness under the `[[bench]]` blocks below
# (Phase 5 / `SPECIFICATION.md` Â§9.4). Default features only â€” no
# `html_reports` for the initial scaffold. Off the cdylib because
# it's a dev-dep; further gated by the `bench-seam` feature so the
# bench-only public surface in `lib.rs::bench_seam` doesn't even
# compile in production builds.
criterion = "0.5"

[features]
# Diagnostic-only: enables a `recorder::dump` module that writes the
# discarded buffer at `RSHUTDOWN` to the path named by the
# `PHP_ANALYZE_DUMP_PATH` env var. Used exclusively by the slice-2
# integration tests under `tests/php-recorder/`. Default builds (no
# features) ship no dump code in the cdylib. The feature disappears in
# Phase 4 when the shipper replaces the discard with a `try_send`.
recorder-dump = []
# Bench-only seam: when activated, the crate root grows a
# `pub mod bench_seam` that re-exports the recorder's `pub(crate)`
# hot-path entry points (`begin_with_snapshots`, `end_with_snapshots`,
# `categorise`, the snapshot/categorise value types) so `cargo bench
# --features bench-seam` can reach them without going through PHP.
# Off by default; default cdylib builds carry no extra public surface.
# No transitive feature unlock. See `bench-criterion-skeleton`'s
# `design.md` D-1.
bench-seam = []

[lints]
workspace = true

[[bench]]
name = "recorder_hot_path"
harness = false

[[bench]]
name = "recorder_workload"
harness = false

# NFR-PERF-1 / OQ-7 binding: PHP-driven workload-overhead
# bench that times each of three canonical workloads
# unprofiled vs. profiled, computes the geo-mean ratio, and
# asserts `â‰¤ 2.0Ă—`. Opt-in via `PHP_ANALYZE_RUN_BENCH=1`
# (default `cargo bench` does NOT require PHP installed).
# Uses `std::process::Command` + `std::time::Instant` directly,
# no criterion: PHP-subprocess variance is dominated by
# startup latency, not measurement precision. See
# `bench-canonical-workloads`'s `design.md` D-6.
[[bench]]
name = "workload_overhead"
harness = false
